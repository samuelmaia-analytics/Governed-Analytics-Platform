version: 2

models:
  - name: fact_orders_enriched
    description: >
      Tabela analítica principal com granularidade por item de pedido
      (order_id + order_item_id + product_id + seller_id).
      Contém colunas sensíveis (customer_id, geolocalização detalhada)
      — uso exclusivo na camada curated interna.
    config:
      tags: ["curated", "internal"]
    columns:
      - name: order_id
        description: "Identificador do pedido."
        tests: [not_null]
      - name: order_item_id
        description: "Sequência do item dentro do pedido."
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: seller_id
        tests: [not_null]
      - name: order_purchase_timestamp
        tests: [not_null]
      - name: price
        description: "Preço do item em R$. Sempre >= 0 após limpeza."
        tests: [not_null]
      - name: freight_value
        description: "Valor do frete do item em R$. Sempre >= 0 após limpeza."
        tests: [not_null]
      - name: total_item_value
        description: "Soma de price + freight_value."
        tests: [not_null]
      - name: seller_volume_tier
        tests:
          - accepted_values:
              values: [long_tail, scaled, core, strategic]
      - name: is_delayed
        tests: [not_null]
      - name: is_first_order
        tests: [not_null]
      - name: customer_order_sequence
        tests: [not_null]

  - name: fact_orders_dashboard
    description: >
      Camada publicada para consumo do dashboard executivo.
      Colunas sensíveis removidas ou pseudonimizadas: customer_id e
      seller_id substituídos por hashes; cidade e CEP omitidos.
      Granularidade: order_id + order_item_id.
    config:
      tags: ["published", "dashboard"]
    columns:
      - name: order_id
        description: "Identificador do pedido (sem PII direto após publicação)."
        tests: [not_null]
      - name: order_item_id
        tests: [not_null]
      - name: customer_unique_id
        description: "ID único do cliente — pseudonimizado na camada curated, mantido para análise de coorte."
        tests: [not_null]
      - name: seller_key
        description: "Hash MD5 do seller_id — substitui o identificador bruto."
        tests: [not_null]
      - name: order_purchase_timestamp
        tests: [not_null]
      - name: price
        tests: [not_null]
      - name: total_item_value
        tests: [not_null]
      - name: payment_type_mode
        description: "Tipo de pagamento mais frequente no pedido. 'unknown' quando ausente."
        tests: [not_null]
      - name: seller_volume_tier
        tests:
          - accepted_values:
              values: [long_tail, scaled, core, strategic]
      - name: customer_state
        tests: [not_null]
      - name: is_delayed
        tests: [not_null]
      - name: is_first_order
        tests: [not_null]
      - name: customer_order_sequence
        tests: [not_null]
