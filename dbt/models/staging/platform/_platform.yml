version: 2

sources:
  - name: python_curated
    description: >
      Trusted outputs materialized by the Python batch pipeline. These assets are the system-of-record
      handoff into dbt and should be refreshed by `src/run_platform_pipeline.py` before semantic modeling.
    loader: python_batch_pipeline
    freshness:
      warn_after: {count: 36, period: hour}
      error_after: {count: 72, period: hour}
    tables:
      - name: fact_orders_enriched
        description: >
          Internal curated fact table at order-item grain. It remains Python-owned and feeds dbt
          lineage, tests, and semantic marts.
        loaded_at_field: order_purchase_timestamp
  - name: python_published
    description: >
      Governed publication assets generated by the Python pipeline after privacy controls and minimization.
    loader: python_batch_pipeline
    freshness:
      warn_after: {count: 36, period: hour}
      error_after: {count: 72, period: hour}
    tables:
      - name: fact_orders_dashboard
        description: >
          Published dashboard fact that forms the official exposure boundary for executive consumption.
        loaded_at_field: order_purchase_timestamp

models:
  - name: stg_platform__fact_orders_enriched
    description: >
      Typed staging wrapper over the Python-curated `fact_orders_enriched` parquet. It standardizes the
      asset for documentation and testing without recreating upstream transformation logic.
    columns:
      - name: order_id
        description: Internal operational order identifier at the curated layer.
        tests: [not_null]
      - name: order_item_id
        description: Item sequence within the order, preserving the curated fact grain.
        tests: [not_null]
      - name: customer_unique_id
        description: Natural customer key used for repeat-behavior and cohort analysis internally.
        tests: [not_null]
      - name: product_id
        description: Product identifier retained only in the internal curated layer.
        tests: [not_null]
      - name: seller_id
        description: Seller identifier retained only in the internal curated layer.
        tests: [not_null]
      - name: order_status
        description: Final recorded operational status for the order.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['approved', 'canceled', 'created', 'delivered', 'invoiced', 'processing', 'shipped', 'unavailable']
      - name: order_purchase_timestamp
        description: Purchase timestamp used as the business event time for the curated fact.
        tests: [not_null]
      - name: total_item_value
        description: Item-level gross value calculated upstream as `price + freight_value`.
        tests: [not_null]
      - name: payment_type_mode
        description: Dominant payment method aggregated upstream at order level.
      - name: customer_state
        description: Customer state used for internal geographic analysis.
      - name: seller_state
        description: Seller state used for internal geographic and logistics analysis.
      - name: seller_volume_tier
        description: Python-derived seller segmentation reused by published semantic marts.
        tests:
          - accepted_values:
              arguments:
                values: ['long_tail', 'scaled', 'core', 'strategic']

  - name: stg_platform__fact_orders_dashboard
    description: >
      Typed staging wrapper over the governed published fact consumed by Streamlit, Power BI, and dbt marts.
      This is the dbt entry point for executive-facing semantic modeling.
    columns:
      - name: order_id
        description: Pseudonymized order token safe for published analytical use.
        tests: [not_null]
      - name: order_item_id
        description: Item identifier within the pseudonymized order.
        tests: [not_null]
      - name: customer_unique_id
        description: Pseudonymized customer token used for retention and repeat behavior analysis.
        tests: [not_null]
      - name: order_status
        description: Published order lifecycle status.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['approved', 'canceled', 'created', 'delivered', 'invoiced', 'processing', 'shipped', 'unavailable', 'unknown']
      - name: order_purchase_timestamp
        description: Purchase timestamp retained in the published layer for temporal analytics.
        tests: [not_null]
      - name: seller_key
        description: Pseudonymized seller token used for published seller-performance analysis.
        tests: [not_null]
      - name: seller_volume_tier
        description: Published seller segmentation derived upstream in Python.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['long_tail', 'scaled', 'core', 'strategic']
      - name: total_item_value
        description: Published item-level gross value supporting revenue KPIs.
        tests: [not_null]
      - name: payment_type_mode
        description: Published dominant payment method for the order.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['boleto', 'credit_card', 'debit_card', 'voucher', 'unknown']
      - name: product_category_name_english
        description: Business-facing English category label used in executive reporting.
      - name: customer_state
        description: Published customer state with nulls standardized upstream to `NA`.
        tests: [not_null]
      - name: seller_state
        description: Published seller state with nulls standardized upstream to `NA`.
        tests: [not_null]
