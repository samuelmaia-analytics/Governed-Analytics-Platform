version: 2

models:
  - name: stg_olist__orders
    description: "Pedidos limpos e deduplicados com timestamps tipados."
    columns:
      - name: order_id
        description: "Chave primária do pedido."
        tests:
          - unique
          - not_null
      - name: customer_id
        tests: [not_null]
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: [delivered, shipped, canceled, unavailable, invoiced,
                       processing, created, approved]

  - name: stg_olist__order_items
    description: "Itens de pedido limpos com granularidade order+item+product+seller."
    columns:
      - name: order_id
        tests: [not_null]
      - name: order_item_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: seller_id
        tests: [not_null]
      - name: price
        tests: [not_null]
      - name: freight_value
        tests: [not_null]

  - name: stg_olist__customers
    description: "Clientes deduplicados por customer_id."
    columns:
      - name: customer_id
        tests: [unique, not_null]
      - name: customer_unique_id
        tests: [not_null]
      - name: customer_state
        tests: [not_null]

  - name: stg_olist__products
    description: "Produtos deduplicados por product_id."
    columns:
      - name: product_id
        tests: [unique, not_null]

  - name: stg_olist__sellers
    description: "Sellers deduplicados por seller_id."
    columns:
      - name: seller_id
        tests: [unique, not_null]
      - name: seller_state
        tests: [not_null]

  - name: stg_olist__payments
    description: "Pagamentos por pedido, mantendo múltiplas sequências."
    columns:
      - name: order_id
        tests: [not_null]
      - name: payment_sequential
        tests: [not_null]

  - name: stg_olist__reviews
    description: "Avaliações de pedido deduplicadas por review_id."
    columns:
      - name: review_id
        tests: [unique, not_null]
      - name: order_id
        tests: [not_null]
      - name: review_score
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4, 5]

  - name: stg_olist__category_translation
    description: "Tradução das categorias PT→EN."
    columns:
      - name: product_category_name
        tests: [unique, not_null]
