name: governed_analytics_platform
version: 1.0.0
config-version: 2

profile: governed_analytics_platform

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

vars:
  curated_analytics_path: "../data/curated/analytics"
  published_dashboard_path: "../data/published/dashboard"
  published_semantic_path: "../data/published/semantic"

models:
  governed_analytics_platform:
    staging:
      +materialized: view
    intermediate:
      +materialized: view
    marts:
      core:
        +materialized: table
      published:
        +materialized: table
