name: Policy Check

on:
  push:
    branches:
      - develop
      - release
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: policy-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance-policy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate release governance contract
        run: python src/governance_validation.py

      - name: Validate workflow policy contract
        run: python src/workflow_policy_validation.py
