name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt ".[dev]"

      - name: Run Ruff
        run: python -m ruff check src streamlit_app tests

      - name: Smoke check pipeline entrypoint
        run: python src/run_platform_pipeline.py --list-steps

      - name: Validate release governance contract
        run: python src/governance_validation.py

      - name: Run tests
        run: python -m pytest tests
