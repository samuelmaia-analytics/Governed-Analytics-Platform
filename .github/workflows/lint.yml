name: Lint

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Ruff
        run: python -m pip install ruff

      - name: Run Ruff
        run: ruff check src streamlit_app tests
