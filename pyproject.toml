[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "samuelmaia-ddf-032026"
version = "0.1.0"
description = "Projeto de analise de dados com pipeline Python e dashboard Streamlit."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pandas",
    "numpy",
    "streamlit==1.55.0",
    "altair==6.0.0",
    "plotly",
    "matplotlib",
    "seaborn",
    "duckdb",
    "pyarrow",
    "openpyxl",
    "python-dotenv",
    "jinja2",
    "pytest",
    "requests",
]
